name: glaucoma-capstone

channels:
  - pytorch
  - nvidia
  - conda-forge

dependencies:
  - python=3.11
  - pip

  # Core workflow
  - ipykernel
  - jupyterlab
  - notebook

  # Data handling
  - numpy
  - pandas
  - tqdm
  - pyyaml
  - scipy

  # Visualization
  - matplotlib
  - seaborn
  - tensorboard

  # Image processing
  - pillow
  - opencv
  - scikit-image
  - albumentations
  - stringzilla

  # Modeling utilities
  - scikit-learn

  # Deep learning
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1

  # Testing / repo health
  - pytest

  # Pip-only packages
  - pip:
      - kaggle
      - segmentation-models-pytorch
      - timm
      - torchmetrics
      - simsimd

variables:
  PYTHONNOUSERSITE: "1"